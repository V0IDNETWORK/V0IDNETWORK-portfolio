services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SITE_URL=${SITE_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - CONTACT_TO_EMAIL=${CONTACT_TO_EMAIL}
      - CONTACT_FROM_EMAIL=${CONTACT_FROM_EMAIL}
    restart: unless-stopped
